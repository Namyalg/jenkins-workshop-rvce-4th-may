<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manoj - Jenkins Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'EB Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #ffffff;
            color: #000000;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #000000;
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 500;
        }
        p {
            font-size: 1.2rem;
        }
        .name {
            font-size: 2rem;
            font-weight: 600;
            margin: 30px 0;
        }
        .build-info {
            margin-top: 30px;
            font-size: 1rem;
            border-top: 1px solid #000000;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to DevOps Workshop</h1>
        <p>RVCE - 4th May</p>
        <div class="name">Manoj</div>
        <p>This page was deployed using Jenkins CI/CD Pipeline</p>
        <div class="build-info">
            <p>Branch: master</p>
            <p>Deployed at: TIMESTAMP_PLACEHOLDER</p>
        </div>
    </div>
</body>
</html>
