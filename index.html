<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Workshop - RVCE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .name {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        .build-info {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to DevOps Workshop</h1>
        <p>RVCE - 4th May</p>
        <div class="name">Your Name Here</div>
        <p>This page was deployed using Jenkins CI/CD Pipeline</p>
        <div class="build-info">
            <p>Branch: <span id="branch">master</span></p>
        </div>
    </div>
</body>
</html>
